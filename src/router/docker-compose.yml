version: '3.8'

services:
  # Simulated attacker machine
  attacker:
    image: kalilinux/kali-linux-docker
    container_name: attacker
    command: sleep infinity
    networks:
      lan:
        ipv4_address: 192.168.10.2
    cap_add:
      - NET_RAW

  # Simulated client machine
  client:
    image: debian:stable-slim
    container_name: client
    command: sleep infinity
    networks:
      lan:
        ipv4_address: 192.168.10.3
    cap_add:
      - NET_RAW

    # First router with interfaces on LAN and transit_12
  router1:
    build: ./router
    hostname: router1
    container_name: router1
    networks:
      lan:
        ipv4_address: 192.168.10.1
    environment:
      IFACE0_IP: 192.168.10.1/24
      IFACE1_IP: 192.168.20.1/24
      ROUTES: |
        192.168.30.0/24:192.168.20.2:eth1;
        192.168.40.0/30:192.168.20.2:eth1;
        192.168.50.0/24:192.168.20.2:eth1
    cap_add:
      - NET_ADMIN
    privileged: true

    # Second router with interfaces on transit_12 and transit_23
  router2:
    build: ./router
    hostname: router2
    container_name: router2
    networks:
      transit_12:
        ipv4_address: 192.168.20.2
      dmz:
        ipv4_address: 192.168.30.1
      transit_23:
        ipv4_address: 192.168.40.1
    environment:
      IFACE0_IP: 192.168.20.2/30
      IFACE1_IP: 192.168.30.1/24
      IFACE2_IP: 192.168.40.1/30
      ROUTES: |
        192.168.10.0/24:192.168.20.1:eth0;
        192.168.50.0/24:192.168.40.2:eth2
    cap_add:
      - NET_ADMIN
    privileged: true

  # Third router with interfaces on transit_23 and DMZ
  router3:
    build: ./router
    container_name: router3
    hostname: router3
    networks:
      transit_23:
        ipv4_address: 192.168.40.2
      internal:
        ipv4_address: 192.168.50.1
    environment:
      IFACE0_IP: 192.168.40.2/30
      IFACE1_IP: 192.168.50.1/24
      ROUTES: |
        192.168.10.0/24:192.168.40.1:eth0;
        192.168.30.0/24:192.168.40.1:eth0
    cap_add:
      - NET_ADMIN
    privileged: true

  # Web server in the DMZ
  dmz_web:
    image: nginx:alpine
    container_name: dmz_web
    networks:
      dmz:
        ipv4_address: 192.168.30.10
    environment:
      DEFAULT_GATEWAY: 192.168.30.1

  # FTP server in the DMZ
  dmz_ftp:
    image: fauria/vsftpd
    container_name: dmz_ftp
    networks:
      dmz:
        ipv4_address: 192.168.30.11
    environment:
      PASV_ADDRESS: 192.168.30.11
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
      DEFAULT_DNS: 8.8.8.8
      DEFAULT_GATEWAY: 192.168.30.1

  # Two internal hosts on the internal network.
  internal_host1:
    image: debian:stable-slim
    command: sleep infinity
    networks:
      internal:
        ipv4_address: 192.168.50.10
    environment:
      DEFAULT_GATEWAY: 192.168.50.1
    cap_add:
      - NET_RAW

  internal_host2:
    image: debian:stable-slim
    command: sleep infinity
    networks:
      internal:
        ipv4_address: 192.168.50.11
    environment:
      DEFAULT_GATEWAY: 192.168.50.1
    cap_add:
      - NET_RAW

  switch:
    image: alpine:latest
    container_name: switch
    command: sleep infinity
    networks:
      lan:
        ipv4_address: 192.168.10.254
    cap_add:
      - NET_RAW

networks:
  lan:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.10.0/24

  transit_12:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.20.0/30

  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.30.0/24

  transit_23:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.40.0/30

  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.50.0/24
