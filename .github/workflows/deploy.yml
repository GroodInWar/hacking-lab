name: Deploy static site to GitHub Pages

# This workflow builds and deploys the documentation site stored in
# the `docs` directory to the `gh-pages` branch whenever changes are
# pushed to the default branch.  It uses GitHub’s built‑in Pages
# deployment actions rather than requiring a static site generator.
#
# To enable GitHub Pages for your repository, navigate to the
# repository settings, enable Pages and select "GitHub Actions" as
# the source.  The workflow will publish the `docs` folder as a
# static website accessible at `https://grooinwar.github.io/hacking-lab/`.

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read # read source code
  pages: write # publish to GitHub Pages
  id-token: write # authenticate with GitHub Pages

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Prepare GitHub Pages artifact from the docs folder.  The
      # configure-pages action sets up the correct configuration for
      # publishing and automatically handles Jekyll processing if
      # applicable.  Because our documentation consists of plain
      # Markdown files, no additional build step is required.
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3
        with:
          # Specify that the site content is located in the docs directory.
          folder: docs

      # Upload the docs directory as a Pages artifact.  This action
      # packages the specified directory and prepares it for deployment.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      # Deploy the uploaded artifact to GitHub Pages.  This action
      # handles publishing to the gh-pages branch and invalidating
      # previous versions of the site.
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
