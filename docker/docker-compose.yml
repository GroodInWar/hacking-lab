services:
  attacker:
    image: kalilinux/kali-linux-docker
    container_name: attacker
    hostname: attacker
    command: sleep infinity
    networks:
      lan:
        ipv4_address: 192.168.10.2
    cap_add:
      - NET_RAW

  client:
    image: debian:stable-slim
    container_name: client
    hostname: client
    command: sleep infinity
    networks:
      lan:
        ipv4_address: 192.168.10.3
    cap_add:
      - NET_RAW

  router1:
    build: ./router
    hostname: router1
    container_name: router1
    networks:
      lan:
        ipv4_address: 192.168.10.1
      transit_12:
        ipv4_address: 192.168.20.1
    environment:
      IFACE0_IP: 192.168.10.1/24
      IFACE1_IP: 192.168.20.1/30
      ROUTES: |
        192.168.30.0/24:192.168.20.2:eth1;
        192.168.40.0/30:192.168.20.2:eth1;
        192.168.50.0/24:192.168.20.2:eth1
    cap_add:
      - NET_ADMIN
    privileged: true

  router2:
    build: ./router
    hostname: router2
    container_name: router2
    networks:
      transit_12:
        ipv4_address: 192.168.20.2
      dmz:
        ipv4_address: 192.168.30.1
      transit_23:
        ipv4_address: 192.168.40.1
    environment:
      IFACE0_IP: 192.168.20.2/30
      IFACE1_IP: 192.168.30.1/24
      IFACE2_IP: 192.168.40.1/30
      ROUTES: |
        192.168.10.0/24:192.168.20.1:eth0;
        192.168.50.0/24:192.168.40.2:eth2
    cap_add:
      - NET_ADMIN
    privileged: true

  router3:
    build: ./router
    container_name: router3
    hostname: router3
    networks:
      transit_23:
        ipv4_address: 192.168.40.2
      internal:
        ipv4_address: 192.168.50.1
    environment:
      IFACE0_IP: 192.168.40.2/30
      IFACE1_IP: 192.168.50.1/24
      ROUTES: |
        192.168.10.0/24:192.168.40.1:eth0;
        192.168.30.0/24:192.168.40.1:eth0
    cap_add:
      - NET_ADMIN
    privileged: true

  dmz_web:
    image: nginx:alpine
    container_name: dmz_web
    hostname: dmz_web
    networks:
      dmz:
        ipv4_address: 192.168.30.10

  dmz_ftp:
    image: fauria/vsftpd
    container_name: dmz_ftp
    hostname: dmz_ftp
    networks:
      dmz:
        ipv4_address: 192.168.30.11
    environment:
      PASV_ADDRESS: 192.168.30.11
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
      DEFAULT_DNS: 8.8.8.8

  internal_host1:
    image: debian:stable-slim
    container_name: internal_host1
    hostname: internal_host1
    command: sleep infinity
    networks:
      internal:
        ipv4_address: 192.168.50.10
    cap_add:
      - NET_RAW

  internal_host2:
    image: debian:stable-slim
    container_name: internal_host2
    hostname: internal_host2
    command: sleep infinity
    networks:
      internal:
        ipv4_address: 192.168.50.11
    cap_add:
      - NET_RAW

networks:
  lan:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.10.0/24
          gateway: 192.168.10.254

  transit_12:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.20.0/29
          gateway: 192.168.20.6

  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.30.0/24
          gateway: 192.168.30.254

  transit_23:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.40.0/29
          gateway: 192.168.40.6

  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.50.0/24
          gateway: 192.168.50.254
