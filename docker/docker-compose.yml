version: '3.8'

services:
  attacker:
    image: kalilinux/kali-linux-docker
    container_name: attacker
    hostname: attacker
    command: sleep infinity
    networks:
      external:
        ipv4_address: 10.0.0.10
    cap_add:
      - NET_RAW

  client:
    image: debian:stable-slim
    container_name: client
    hostname: client
    command: sleep infinity
    networks:
      external:
        ipv4_address: 10.0.0.20
    cap_add:
      - NET_RAW

  edge_router:
    build: ./router
    hostname: edge_router
    container_name: edge_router
    networks:
      external:
        ipv4_address: 10.0.0.1
      transit:
        ipv4_address: 172.16.0.1
    environment:
      IFACE0_IP: 10.0.0.1/24
      IFACE1_IP: 172.16.0.1/30
      ROUTES: |
        192.168.1.0/24:172.16.0.2:eth1;
        10.1.0.0/24:172.16.0.2:eth1
    cap_add:
      - NET_ADMIN
    privileged: true

  core_router:
    build: ./router
    hostname: core_router
    container_name: core_router
    networks:
      transit:
        ipv4_address: 172.16.0.2
      dmz:
        ipv4_address: 192.168.1.1
    environment:
      IFACE0_IP: 172.16.0.2/30
      IFACE1_IP: 192.168.1.1/24
      ROUTES: |
        10.0.0.0/24:172.16.0.1:eth0;
        10.1.0.0/24:192.168.1.2:eth1
    cap_add:
      - NET_ADMIN
    privileged: true

  internal_router:
    build: ./router
    hostname: internal_router
    container_name: internal_router
    networks:
      dmz:
        ipv4_address: 192.168.1.2
      internal:
        ipv4_address: 10.1.0.1
    environment:
      IFACE0_IP: 192.168.1.2/24
      IFACE1_IP: 10.1.0.1/24
      ROUTES: |
        10.0.0.0/24:192.168.1.1:eth0;
        172.16.0.0/30:192.168.1.1:eth0
    cap_add:
      - NET_ADMIN
    privileged: true

  web_server:
    image: nginx:alpine
    container_name: web_server
    hostname: web_server
    networks:
      dmz:
        ipv4_address: 192.168.1.10

  mail_server:
    image: namshi/smtp
    container_name: mail_server
    hostname: mail_server
    networks:
      dmz:
        ipv4_address: 192.168.1.20

  dns_server:
    image: andyshinn/dnsmasq
    container_name: dns_server
    hostname: dns_server
    command: --log-facility=- --server=8.8.8.8
    networks:
      dmz:
        ipv4_address: 192.168.1.30
    cap_add:
      - NET_ADMIN

  file_server:
    image: debian:stable-slim
    container_name: file_server
    hostname: file_server
    command: sleep infinity
    networks:
      internal:
        ipv4_address: 10.1.0.10
    cap_add:
      - NET_RAW

  database_server:
    image: mysql:5.7
    container_name: database_server
    hostname: database_server
    command: --default-authentication-plugin=mysql_native_password
    networks:
      internal:
        ipv4_address: 10.1.0.20
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword

  user_pc:
    image: debian:stable-slim
    container_name: user_pc
    hostname: user_pc
    command: sleep infinity
    networks:
      internal:
        ipv4_address: 10.1.0.100
    cap_add:
      - NET_RAW

networks:
  external:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24

  transit:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/30

  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.1.0/24

  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.0.0/24
